name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm test

  package:
    # Gates PR feedback on build (compile/lint/test); a successful
    # build triggers a VSIX package so reviewers have an installable
    # artifact without each of us running `npm run bundle:vsix`. Runs
    # on every PR and every push to main — storage is cheap, the
    # packaging round-trip catches issues compile alone can miss
    # (unresolved %nls% keys, missing icon paths, etc.).
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Package extension
        run: npm run bundle:vsix
      - name: Stage artifacts
        run: |
          mkdir -p extensions
          find . -maxdepth 2 -name "*.vsix" -type f -exec cp {} ./extensions \;
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: salesforcedx-vscode-manager-${{ github.sha }}
          path: ./extensions/
          if-no-files-found: error
